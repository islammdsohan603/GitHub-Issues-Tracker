<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- link font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- link tailwind css and daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  <!-- link custom css -->
  <link rel="stylesheet" href="tailwind.config.css">

  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <title>Home Page</title>
</head>

<body>

  <!-- header -->
  <header class="bg-white shadow">
    <nav class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4 p-4">

      <div class="flex items-center gap-2">
        <img src="./assets/github-logo.png" alt="github logo" class="w-10 h-10">
        <h1 class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto">
        <input id="searchIpnut" type="text" placeholder="Search issues" class="input input-bordered w-full sm:w-64">
        <button id="btnSearch" class="btn btn-primary w-full sm:w-auto">+ New Issue</button>
      </div>

    </nav>
  </header>

  <script src="main.js"></script>
</body>

</html>
