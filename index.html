<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- link font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- link tailwind css and daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  <!-- link custom css -->
  <link rel="stylesheet" href="tailwind.config.css">

  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <title>Login Page</title>
</head>

<body class="bg-base-300 min-h-screen flex items-center justify-center">

  <section class="w-full bg-white h-screen max-w-md px-4">

    <div class="space-y-8">

      <!-- Header -->
      <div class="flex flex-col items-center justify-center space-y-2 text-center">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-24 sm:w-32 md:w-30 pt-12">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-base sm:text-lg md:text-xl text-gray-500">Sign in to manage your issues</p>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <fieldset class="  rounded-2xl p-6 sm:p-8   space-y-4">

          <div class="space-y-2">
            <label class="text-lg font-bold">Username</label>
            <input id="username-input" type="email" class="input input-bordered w-full p-3 rounded-xl"
              placeholder="Enter your username" />
          </div>

          <div class="space-y-2">
            <label class="text-lg font-bold">Password</label>
            <input id="password-input" type="password" class="input input-bordered w-full p-3 rounded-xl"
              placeholder="Enter your password" />
          </div>

          <button id="sign-in-button" class="btn btn-primary w-full py-3 text-lg rounded-xl">
            Sign in
          </button>

        </fieldset>
      </div>

    </div>
    <div class="divider">OR</div>

    <p class="text-center my-2 text-xl font-semibold text-neutral-500">Demo Credentials</p>
    <div class="flex items-center w-11/12 mx-auto justify-center p-4   bg-gray-200 rounded-xl">
      <div>

        <h2 class="text-2xl font-bold">Username: <span class="text-xl font-bold text-neutral-600">admin</span></h2>
        <h2 class="text-2xl font-bold">Password: <span class="text-xl font-bold text-neutral-600">admin123</span></h2>

      </div>
  </section>

  <script src="log.js"></script>
</body>

</html>
