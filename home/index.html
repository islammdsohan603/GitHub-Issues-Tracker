<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- link font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- link tailwind css and daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  <!-- link custom css -->
  <link rel="stylesheet" href="../tailwind.config.css">

  <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">
  <title>Home Page</title>
</head>

<body>

  <!-- header -->
  <header class="bg-white shadow">
    <nav class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4 p-4">

      <div class="flex items-center gap-2">
        <img src="../assets/github-logo.png" alt="github logo" class="w-10 h-10">
        <h1 class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto">
        <input id="searchIpnut" type="text" placeholder="Search issues" class="input input-bordered w-full sm:w-64 ">
        <button id="btnSearch" class="btn btn-primary w-full sm:w-auto">+ New Issue</button>
      </div>

    </nav>
  </header>
  <main class="bg-gray-100 w-full min-h-screen py-8 space-y-6">

    <!-- buttons section -->
    <section class="bg-white shadow w-11/12 md:max-w-10/12 mx-auto rounded-xl p-4">
      <div id="tab-section" class="flex flex-wrap mx-auto items-center gap-2 justify-center md:justify-start">
        <button id="allBtn" class="btn btn-primary font-bold px-6 md:px-8">All</button>
        <button id="openBtn" class="btn btn-outline font-bold px-6 md:px-8">Open</button>
        <button id="closedBtn" class="btn btn-outline font-bold px-6 md:px-8">Closed</button>
      </div>
    </section>
    <!-- issues -->
    <div id="allSectionCards" class="bg-white shadow w-11/12 md:max-w-10/12 mx-auto p-4 rounded-xl">
      <section class=" w-full shadow-xl mx-auto rounded-xl p-4">

        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">

          <div class="flex items-center gap-2">
            <img src="../assets/Aperture.png" alt="">
            <div>
              <h3 class="text-lg font-bold"><span id="countNumber">50</span> Issues</h3>
              <p class="font-semibold text-gray-500 text-sm">Track and manage your issues</p>
            </div>
          </div>


          <div class="flex items-center gap-2">
            <button class="btn border-none">
              <div class="w-3 h-3 rounded-full bg-green-400"></div> Open
            </button>

            <button class="btn border-none">
              <div class="w-3 h-3 rounded-full bg-purple-500"></div> Closed
            </button>
          </div>

        </div>

      </section>

      <section class="my-4">

        <!-- loding spinaer-->
        <div id="loding" class="hidden">
          <div class=" flex items-center justify-center  py-5">
            <span class="loading loading-spinner text-primary"></span>
            <span class="loading loading-spinner text-secondary"></span>
            <span class="loading loading-spinner text-accent"></span>
          </div>
        </div>

        <div id="cardSection" class="grid grid-cols-1 md:grid-cols-2 gap-4 lg:grid-cols-4 ">
          <!-- loadCard -->

        </div>
      </section>

      <!-- modal add -->

      <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div id="modalContainer" class="modal-box">




          <div class="modal-action">
            <form method="dialog">

              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>


  </main>
  <script src="main.js"></script>
</body>

</html>
